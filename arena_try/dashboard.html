<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Панель управления — АО «НПП «Исток»</title>
    <link rel="stylesheet" href="/dashboard.css">
</head>
<body>
    <!-- Кнопка переключения темы -->
    <button class="theme-toggle" onclick="toggleTheme()" title="Переключить тему">🌙</button>

    <div class="app-layout">
        <!-- Сайдбар -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <div class="sidebar-title">
                    <h2>НПП «Исток»</h2>
                    <span>Управление производством</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" onclick="showContent('devices', event)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="3" width="20" height="14" rx="2"/>
                        <path d="M8 21h8M12 17v4"/>
                    </svg>
                    <span>Устройства</span>
                </a>
                <a href="#" class="nav-item" onclick="showContent('device-types', event)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 7h16M4 12h16M4 17h10"/>
                    </svg>
                    <span>Типы изделий</span>
                </a>
                <a href="#" class="nav-item" onclick="showContent('components', event)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>
                    </svg>
                    <span>Комплектующие</span>
                </a>
                <a href="#" class="nav-item" onclick="showContent('production-places', event)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
                        <circle cx="12" cy="10" r="3"/>
                    </svg>
                    <span>Места производства</span>
                </a>
                <a href="#" class="nav-item" onclick="showContent('serial-structure', event)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 9h16M4 15h16M10 3v18M14 3v18"/>
                    </svg>
                    <span>Структура SN</span>
                </a>
                <a href="#" class="nav-item" onclick="showContent('statistics', event)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 20V10M12 20V4M6 20v-6"/>
                    </svg>
                    <span>Статистика</span>
                </a>
            </nav>
        </aside>

        <!-- Основной контент -->
        <main class="main-content">
            <!-- Верхняя панель -->
            <header class="top-bar">
                <div class="top-bar-left">
                    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                    <h1 id="pageTitle">Устройства</h1>
                </div>
                <div class="top-bar-right">
                    <a href="#" class="top-link" onclick="showTopContent('profile', event)">Профиль</a>
                    <a href="#" class="top-link" id="employeesLink" onclick="showTopContent('employees', event)" style="display:none;">Сотрудники</a>
                    <a href="#" class="top-link" onclick="showTopContent('about', event)">О программе</a>
                    <a href="#" class="top-link" onclick="showTopContent('settings', event)">Настройки</a>
                    <a href="#" class="top-link logout" onclick="logout(event)">Выйти</a>
                </div>
            </header>

            <!-- Область контента -->
            <div class="content-area" id="contentArea">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <p>Загрузка...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Модальное окно -->
    <div class="modal-overlay" id="modalOverlay" style="display:none;" onclick="closeModal(event)">
        <div class="modal-container" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modalTitle">Заголовок</h2>
                <button class="modal-close" onclick="closeModalForce()">×</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Содержимое модального окна -->
            </div>
        </div>
    </div>

    <script src="/dashboard.js"></script>
</body>
</html>
