<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация — АО «НПП «Исток»</title>
    <link rel="stylesheet" href="/auto.css">
</head>
<body>
    <div class="login-bg">
        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
            <div class="shape shape-4"></div>
            <div class="shape shape-5"></div>
        </div>

        <div class="login-card">
            <div class="login-header">
                <div class="logo-container">
                    <img src="/images/istok-logo.png" alt="АО НПП Исток" class="logo-image" onerror="this.style.display='none'">
                </div>
            </div>

            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <input type="text" id="username" name="username" placeholder="Логин" required autocomplete="username">
                </div>

                <div class="input-group">
                    <input type="password" id="password" name="password" placeholder="Пароль" required autocomplete="current-password">
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">
                        <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>

                <div id="errorMessage" class="error-message"></div>

                <button type="submit" class="login-btn">
                    <span>Войти</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <script>
        function togglePasswordVisibility() {
            const pwd = document.getElementById('password');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = '';
            errorEl.classList.remove('show');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            const btn = e.target.querySelector('.login-btn');
            btn.classList.add('loading');

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    errorEl.textContent = data.error || 'Ошибка авторизации';
                    errorEl.classList.add('show');
                    btn.classList.remove('loading');
                    return;
                }

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = '/dashboard?token=' + data.token;
            } catch (err) {
                errorEl.textContent = 'Ошибка подключения к серверу';
                errorEl.classList.add('show');
                btn.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
