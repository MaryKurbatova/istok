<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="dashboard.css">
    <title>Панель управления</title>
</head>
<body>
    <!-- Кнопка переключения темы -->
    <button class="theme-toggle" onclick="toggleTheme()">
        <span class="light-icon">☀</span>
        <span class="dark-icon">☾</span>
    </button>

    <div class="dashboard-container">
        <!-- Боковые вкладки (основные разделы) -->
        <div class="sidebar">
            <button class="sidebar-tab active" onclick="showContent('devices')">Устройства</button>
            <button class="sidebar-tab" onclick="showContent('product-types')">Типы изделий</button>
            <button class="sidebar-tab" onclick="showContent('components')">Комплектующие</button>
            <button class="sidebar-tab" onclick="showContent('production-places')">Места производства</button>
            <button class="sidebar-tab" onclick="showContent('serial-structure')">Структура серийного номера</button>
            <button class="sidebar-tab" onclick="showContent('statistic')">Статистика</button>
        </div>

        <!-- Основное содержание -->
        <div class="main-content">
            <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
            <div class="top-panel">
                <div class="user-info">
                    <div class="user-name">Администратор</div>
                    <div class="user-role">Главный администратор</div>
                </div>
                <div class="top-tabs">
                    <button class="top-tab" onclick="showTopContent('employees')">Сотрудники</button>
                    <button class="top-tab" onclick="showTopContent('about')">О программе</button>
                    <button class="top-tab" onclick="showTopContent('profile')">Профиль</button>
                    <button class="top-tab" onclick="showTopContent('settings')">Настройки</button>
                    <button class="top-tab logout-tab" onclick="logout()">Выйти</button>
                </div>
            </div>

            <div class="content-area" id="content-area">
                <!-- Контент по умолчанию - Устройства -->
                <div class="devices-page">
                    <div class="page-header">
                        <h1>УСТРОЙСТВА</h1>
                        <div class="header-controls">
                            <div class="search-box">
                                <input type="text" id="device-search" placeholder="Поиск по серийному номеру, типу..." oninput="filterDevices()">
                                <button class="search-button">🔍</button>
                            </div>
                            <button class="add-button" onclick="addDevice()">+ Добавить устройство</button>
                        </div>
                    </div>
                    <div class="page-content">
                        <div class="table-container">
                            <table class="data-table" id="devices-table">
                                <thead>
                                    <tr>
                                        <th>Серийный номер</th>
                                        <th>Тип</th>
                                        <th>Версия ОС</th>
                                        <th>Дата производства</th>
                                        <th>Статус</th>
                                        <th>Действия</th>
                                    </tr>
                                </thead>
                                <tbody id="devices-list">
                                    <!-- Данные загружаются через JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Сохраняем оригинальные функции
        window.originalShowContent = window.showContent;
        window.originalShowTopContent = window.showTopContent;

        // Функция переключения темы
        function toggleTheme() {
            const body = document.body;
            if (body.classList.contains('theme-dark')) {
                body.classList.remove('theme-dark');
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.add('theme-dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        // Загрузка сохраненной темы
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('theme-dark');
            }
            
            // Показываем контент по умолчанию (устройства)
            showContent('devices');
        });

        // Функция для отображения контента из бокового меню
        function showContent(contentType) {
            const contentArea = document.getElementById('content-area');
            let content = '';

            switch(contentType) {
                case 'devices':
                    content = `
                        <div class="devices-page">
                            <div class="page-header">
                                <h1>УСТРОЙСТВА</h1>
                                <div class="header-controls">
                                    <div class="search-box">
                                        <input type="text" id="device-search" placeholder="Поиск по серийному номеру, типу..." oninput="filterDevices()">
                                        <button class="search-button">🔍</button>
                                    </div>
                                    <button class="add-button" onclick="addDevice()">+ Добавить устройство</button>
                                </div>
                            </div>
                            <div class="page-content">
                                <div class="table-container">
                                    <table class="data-table" id="devices-table">
                                        <thead>
                                            <tr>
                                                <th>Серийный номер</th>
                                                <th>Тип</th>
                                                <th>Версия ОС</th>
                                                <th>Дата производства</th>
                                                <th>Статус</th>
                                                <th>Действия</th>
                                            </tr>
                                        </thead>
                                        <tbody id="devices-list">
                                            <!-- Данные загружаются через JS -->
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    `;
                    break;
                    
                case 'product-types':
                    content = `
                        <div class="product-types-page">
                            <div class="page-header">
                                <h1>ТИПЫ ИЗДЕЛИЙ</h1>
                                <button class="add-button" onclick="addProductType()">+ Добавить тип</button>
                            </div>
                            <div class="page-content">
                                <div class="table-container">
                                    <table class="data-table">
                                        <thead>
                                            <tr>
                                                <th>Код</th>
                                                <th>Название</th>
                                                <th>Действия</th>
                                            </tr>
                                        </thead>
                                        <tbody id="product-types-list"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    `;
                    break;
                    
                case 'components':
                    content = `
                        <div class="components-page">
                            <div class="page-header">
                                <h1>КОМПЛЕКТУЮЩИЕ</h1>
                                <button class="add-button" onclick="addComponent()">+ Добавить комплектующее</button>
                            </div>
                            <div class="page-content">
                                <div class="table-container">
                                    <table class="data-table">
                                        <thead>
                                            <tr>
                                                <th>Тип</th>
                                                <th>Серийный номер</th>
                                                <th>ID устройства</th>
                                                <th>Кто проверил</th>
                                                <th>Дата проверки</th>
                                                <th>Действия</th>
                                            </tr>
                                        </thead>
                                        <tbody id="components-list"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    `;
                    break;
                    
                case 'production-places':
                    content = `
                        <div class="production-places-page">
                            <div class="page-header">
                                <h1>МЕСТА ПРОИЗВОДСТВА</h1>
                                <button class="add-button" onclick="addProductionPlace()">+ Добавить место</button>
                            </div>
                            <div class="page-content">
                                <div class="table-container">
                                    <table class="data-table">
                                        <thead>
                                            <tr>
                                                <th>Код</th>
                                                <th>Название</th>
                                                <th>Действия</th>
                                            </tr>
                                        </thead>
                                        <tbody id="production-places-list"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    `;
                    break;
                    
                case 'serial-structure':
                    content = `
                        <div class="serial-structure">
                            <div class="page-header">
                                <h1>СТРУКТУРА СЕРИЙНЫХ НОМЕРОВ</h1>
                            </div>
                            <div class="page-content">
                                <div class="current-format">
                                    <h3>ТЕКУЩИЙ ФОРМАТ:</h3>
                                    <div class="format-display">RS 10 10 16 03 0001</div>
                                </div>
                                <div class="explanation">
                                    <h4>Расшифровка структуры:</h4>
                                    <div class="explanation-grid">
                                        <div class="explanation-item">
                                            <span class="segment-name">Тип устройства</span>
                                            <span class="segment-preview">RS</span>
                                            <span class="segment-description">2 буквы, тип устройства</span>
                                        </div>
                                        <div class="explanation-item">
                                            <span class="segment-name">Тип конфигурации</span>
                                            <span class="segment-preview">10</span>
                                            <span class="segment-description">2 цифры, конфигурация</span>
                                        </div>
                                        <div class="explanation-item">
                                            <span class="segment-name">Код производства</span>
                                            <span class="segment-preview">10</span>
                                            <span class="segment-description">2 цифры, код цеха</span>
                                        </div>
                                        <div class="explanation-item">
                                            <span class="segment-name">Год выпуска</span>
                                            <span class="segment-preview">16</span>
                                            <span class="segment-description">2 цифры, год</span>
                                        </div>
                                        <div class="explanation-item">
                                            <span class="segment-name">Месяц выпуска</span>
                                            <span class="segment-preview">03</span>
                                            <span class="segment-description">2 цифры, месяц</span>
                                        </div>
                                        <div class="explanation-item">
                                            <span class="segment-name">Порядковый номер</span>
                                            <span class="segment-preview">0001</span>
                                            <span class="segment-description">4 цифры, номер</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    break;
                    
                case 'statistic':
                    content = `
                        <div class="statistics-page">
                            <div class="page-header">
                                <h1>СТАТИСТИКА</h1>
                            </div>
                            <div class="page-content" id="statistics-content"></div>
                        </div>
                    `;
                    break;
            }

            contentArea.innerHTML = content;
            
            // Обновляем активную кнопку в боковом меню
            const tabs = document.querySelectorAll('.sidebar-tab');
            tabs.forEach(tab => {
                tab.classList.remove('active');
                if (tab.textContent.toLowerCase().includes(contentType.replace('-', ' '))) {
                    tab.classList.add('active');
                }
            });

            // Загружаем данные в зависимости от типа контента
            setTimeout(() => {
                switch(contentType) {
                    case 'devices':
                        if (typeof loadDevices === 'function') loadDevices();
                        break;
                    case 'product-types':
                        if (typeof loadProductTypes === 'function') loadProductTypes();
                        break;
                    case 'production-places':
                        if (typeof loadProductionPlaces === 'function') loadProductionPlaces();
                        break;
                    case 'components':
                        if (typeof loadComponents === 'function') loadComponents();
                        break;
                    case 'statistic':
                        if (typeof loadStatistics === 'function') loadStatistics();
                        break;
                }
            }, 100);
        }

        // Функция для отображения контента из верхних вкладок
        function showTopContent(contentType) {
            const contentArea = document.getElementById('content-area');
            let content = '';

            switch(contentType) {
                case 'employees':
                    content = `
                        <div class="employees-page">
                            <div class="page-header">
                                <h1>СОТРУДНИКИ</h1>
                                <button class="add-button" onclick="addEmployee()">+ Добавить сотрудника</button>
                            </div>
                            <div class="page-content">
                                <div class="table-container">
                                    <table class="data-table">
                                        <thead>
                                            <tr>
                                                <th>ФИО</th>
                                                <th>Должность</th>
                                                <th>Логин</th>
                                                <th>Роль</th>
                                                <th>Действия</th>
                                            </tr>
                                        </thead>
                                        <tbody id="employees-list"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    `;
                    break;
                case 'about':
                    content = `
                        <div class="about-page">
                            <div class="page-header">
                                <h1>О ПРОГРАММЕ</h1>
                            </div>
                            <div class="page-content about-content">
                                <div class="about-card">
                                    <h2>Дипломный проект</h2>
                                    <p>Данная информационная система представляет собой дипломный проект, выполненный студенткой группы 405ИС-22 Курбатовой Марией Владимировной.</p>
                                    <p>Проект посвящен разработке автоматизированной системы управления производственным процессом на предприятии.</p>
                                </div>
                                <div class="about-card developer-card">
                                    <h3>О разработчике</h3>
                                    <div class="developer-info">
                                        <div class="info-row">
                                            <span class="info-label">Студент:</span>
                                            <span class="info-value">Курбатова Мария Владимировна</span>
                                        </div>
                                        <div class="info-row">
                                            <span class="info-label">Группа:</span>
                                            <span class="info-value">405ИС-22</span>
                                        </div>
                                        <div class="info-row">
                                            <span class="info-label">Учебное заведение:</span>
                                            <span class="info-value">КМПО РАНХиГС</span>
                                        </div>
                                        <div class="info-row">
                                            <span class="info-label">Год:</span>
                                            <span class="info-value">2026</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="about-card copyright">
                                    <p>© 2026 Все права защищены.</p>
                                </div>
                            </div>
                        </div>
                    `;
                    break;
                case 'profile':
                    content = `
                        <div class="profile-page">
                            <div class="page-header">
                                <h1>ПРОФИЛЬ ПОЛЬЗОВАТЕЛЯ</h1>
                            </div>
                            <div class="page-content">
                                <div class="profile-card">
                                    <div class="profile-avatar">
                                        <span class="avatar-initials">А</span>
                                    </div>
                                    <div class="profile-details">
                                        <h2>Администратор Системы</h2>
                                        <p class="profile-position">Главный администратор</p>
                                    </div>
                                </div>
                                
                                <div class="profile-sections">
                                    <div class="profile-section">
                                        <h3>Личная информация</h3>
                                        <div class="profile-info-grid">
                                            <div class="info-item">
                                                <span class="info-label">Фамилия:</span>
                                                <span class="info-value">Администратор</span>
                                            </div>
                                            <div class="info-item">
                                                <span class="info-label">Имя:</span>
                                                <span class="info-value">Главный</span>
                                            </div>
                                            <div class="info-item">
                                                <span class="info-label">Отчество:</span>
                                                <span class="info-value">Системович</span>
                                            </div>
                                            <div class="info-item">
                                                <span class="info-label">Должность:</span>
                                                <span class="info-value">Главный администратор</span>
                                            </div>
                                            <div class="info-item">
                                                <span class="info-label">Логин:</span>
                                                <span class="info-value">admin</span>
                                            </div>
                                            <div class="info-item">
                                                <span class="info-label">Роль:</span>
                                                <span class="info-value"><span class="role-badge admin">Администратор</span></span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div class="profile-section">
                                        <h3>Контактная информация</h3>
                                        <div class="profile-info-grid">
                                            <div class="info-item">
                                                <span class="info-label">Email:</span>
                                                <span class="info-value">admin@istok.ru</span>
                                            </div>
                                            <div class="info-item">
                                                <span class="info-label">Телефон:</span>
                                                <span class="info-value">+7 (495) 123-45-67</span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div class="profile-section">
                                        <h3>Статистика активности</h3>
                                        <div class="profile-stats">
                                            <div class="stat-item">
                                                <span class="stat-value">15.01.2023</span>
                                                <span class="stat-label">Дата регистрации</span>
                                            </div>
                                            <div class="stat-item">
                                                <span class="stat-value">Сегодня</span>
                                                <span class="stat-label">Последний вход</span>
                                            </div>
                                            <div class="stat-item">
                                                <span class="stat-value">127</span>
                                                <span class="stat-label">Действий выполнено</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    break;
                case 'settings':
                    content = `
                        <div class="settings-page">
                            <div class="page-header">
                                <h1>НАСТРОЙКИ СИСТЕМЫ</h1>
                            </div>
                            <div class="page-content">
                                <div class="settings-grid">
                                    <div class="settings-card">
                                        <h3>Тема оформления</h3>
                                        <div class="setting-item">
                                            <span class="setting-label">Темная тема</span>
                                            <label class="switch">
                                                <input type="checkbox" onchange="toggleTheme()" ${document.body.classList.contains('theme-dark') ? 'checked' : ''}>
                                                <span class="slider round"></span>
                                            </label>
                                        </div>
                                    </div>
                                    
                                    <div class="settings-card">
                                        <h3>Язык интерфейса</h3>
                                        <div class="setting-item">
                                            <span class="setting-label">Русский</span>
                                            <input type="radio" name="language" checked class="radio-custom">
                                        </div>
                                        <div class="setting-item">
                                            <span class="setting-label">English</span>
                                            <input type="radio" name="language" class="radio-custom">
                                        </div>
                                    </div>
                                    
                                    <div class="settings-card">
                                        <h3>Уведомления</h3>
                                        <div class="setting-item">
                                            <span class="setting-label">Звуковые уведомления</span>
                                            <label class="switch">
                                                <input type="checkbox" checked>
                                                <span class="slider round"></span>
                                            </label>
                                        </div>
                                        <div class="setting-item">
                                            <span class="setting-label">Уведомления о новых устройствах</span>
                                            <label class="switch">
                                                <input type="checkbox" checked>
                                                <span class="slider round"></span>
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    break;
            }

            contentArea.innerHTML = content;
            
            // Обновляем активную кнопку в верхних вкладках
            const topTabs = document.querySelectorAll('.top-tab');
            topTabs.forEach(tab => tab.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Загружаем данные для сотрудников
            if (contentType === 'employees' && typeof loadEmployees === 'function') {
                setTimeout(() => loadEmployees(), 100);
            }
        }

        // Функция выхода из системы
        function logout() {
            if (confirm('Вы уверены, что хотите выйти из системы?')) {
                window.location.href = '/';
            }
        }

        // Функция фильтрации устройств
        window.filterDevices = function() {
            if (typeof window.filterDevicesImpl === 'function') {
                window.filterDevicesImpl();
            }
        };

        // Временные заглушки для функций
        window.addDevice = function() { console.log('Функция addDevice будет доступна после загрузки dashboard.js'); };
        window.addEmployee = function() { console.log('Функция addEmployee будет доступна после загрузки dashboard.js'); };
        window.addProductType = function() { console.log('Функция addProductType будет доступна после загрузки dashboard.js'); };
        window.addProductionPlace = function() { console.log('Функция addProductionPlace будет доступна после загрузки dashboard.js'); };
        window.addComponent = function() { console.log('Функция addComponent будет доступна после загрузки dashboard.js'); };
        window.loadDevices = function() { console.log('Функция loadDevices будет доступна после загрузки dashboard.js'); };
        window.loadEmployees = function() { console.log('Функция loadEmployees будет доступна после загрузки dashboard.js'); };
        window.loadProductTypes = function() { console.log('Функция loadProductTypes будет доступна после загрузки dashboard.js'); };
        window.loadProductionPlaces = function() { console.log('Функция loadProductionPlaces будет доступна после загрузки dashboard.js'); };
        window.loadComponents = function() { console.log('Функция loadComponents будет доступна после загрузки dashboard.js'); };
        window.loadStatistics = function() { console.log('Функция loadStatistics будет доступна после загрузки dashboard.js'); };
    </script>
    
    <!-- Подключение основного JS с логикой -->
    <script src="dashboard.js"></script>
</body>
</html>
