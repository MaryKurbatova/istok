<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="dashboard.css">
    <title>Панель управления</title>
</head>
<body>
    <!-- Кнопка переключения темы -->
    <button class="theme-toggle" onclick="toggleTheme()">
        <span class="light-icon">☀</span>
        <span class="dark-icon">☾</span>
    </button>

    <div class="dashboard-container">
        <!-- Боковые вкладки -->
        <div class="sidebar">
            <button class="sidebar-tab active" onclick="window.showContent('devices')">Устройства</button>
            <button class="sidebar-tab" onclick="window.showContent('product-types')">Типы изделий</button>
            <button class="sidebar-tab" onclick="window.showContent('components')">Комплектующие</button>
            <button class="sidebar-tab" onclick="window.showContent('production-places')">Места производства</button>
            <button class="sidebar-tab" onclick="window.showContent('serial-structure')">Структура серийного номера</button>
            <button class="sidebar-tab" onclick="window.showContent('statistic')">Статистика</button>
        </div>

        <!-- Основное содержание -->
        <div class="main-content">
            <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
            <div class="top-panel">
                <div class="user-info">
                    <div class="user-name">Администратор</div>
                    <div class="user-role">Главный администратор</div>
                </div>
                <div class="top-tabs">
                    <button class="top-tab active" onclick="window.showTopContent('profile')">Профиль</button>
                    <button class="top-tab" onclick="window.showTopContent('employees')">Сотрудники</button>
                    <button class="top-tab" onclick="window.showTopContent('about')">О программе</button>
                    <button class="top-tab" onclick="window.showTopContent('settings')">Настройки</button>
                    <button class="top-tab" onclick="window.logout()">Выйти</button>
                </div>
            </div>

            <div class="content-area" id="content-area">
                <!-- Контент будет загружен через JavaScript -->
            </div>
        </div>
    </div>

    <script>
        // Функция переключения темы (только эта функция остается в HTML)
        function toggleTheme() {
            const body = document.body;
            if (body.classList.contains('theme-dark')) {
                body.classList.remove('theme-dark');
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.add('theme-dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        // Функция выхода из системы
        function logout() {
            if (confirm('Вы уверены, что хотите выйти из системы?')) {
                window.location.href = '/';
            }
        }

        // Загрузка сохраненной темы
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('theme-dark');
            }
            
            // Показываем контент по умолчанию (устройства)
            // Используем setTimeout, чтобы дать время загрузиться dashboard.js
            setTimeout(() => {
                if (typeof window.showContent === 'function') {
                    window.showContent('devices');
                } else {
                    console.log('Ожидание загрузки dashboard.js...');
                    // Пробуем снова через секунду
                    setTimeout(() => {
                        if (typeof window.showContent === 'function') {
                            window.showContent('devices');
                        } else {
                            console.error('❌ dashboard.js не загрузился!');
                        }
                    }, 1000);
                }
            }, 100);
        });

        // Экспортируем функции в глобальную область
        window.logout = logout;
        window.toggleTheme = toggleTheme;
    </script>
    
    <!-- Подключение основного JS с логикой -->
    <script src="dashboard.js"></script>
</body>
</html>
